services:
  postgres:
    image: postgres:17
    container_name: wiktionary-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: wiktionary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
